<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Dark background -->
  <rect width="40" height="40" rx="8" fill="#0d1117"/>

  <!-- Three concentric arcs: 60° → 300° clockwise (C opens to the right) -->
