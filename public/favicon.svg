  <!-- i=7: 46.5°→58.5°, r_in=7, color=#5b21b6 (dark purple, long) -->
  <path d="M 32.391 33.057 A 18 18 0 0 1 29.405 35.347 L 23.658 25.968 A 7 7 0 0 0 24.819 25.078 Z" fill="#5b21b6"/>
</svg>
