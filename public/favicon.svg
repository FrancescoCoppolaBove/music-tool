  <path d="M 29 35.588 A 18 18 0 1 1 29 4.412" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Middle arc (r=13) -->
  <path d="M 26.5 31.258 A 13 13 0 1 1 26.5 8.742" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Inner arc (r=8) -->
  <path d="M 24 26.928 A 8 8 0 1 1 24 13.072" stroke="#ddd6fe" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- 8 radial segments (300°→420°, clockwise, 15° each, 1.5° pad) -->
  <!-- i=0: 301.5°→313.5°, r_in=14, color=#f0f8ff (white, short) -->
  <path d="M 29.405 4.653 A 18 18 0 0 1 32.391 6.943 L 29.638 9.844 A 14 14 0 0 0 27.315 8.064 Z" fill="#f0f8ff"/>
  <!-- i=1: 316.5°→328.5°, r_in=13, color=#bfecff -->
  <path d="M 33.057 7.609 A 18 18 0 0 1 35.347 10.595 L 31.084 13.207 A 13 13 0 0 0 29.430 10.051 Z" fill="#bfecff"/>
  <!-- i=2: 331.5°→343.5°, r_in=12, color=#67e8f9 -->
