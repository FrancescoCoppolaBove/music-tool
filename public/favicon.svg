  <!-- i=3: 346.5°→358.5°, r_in=11, color=#22d3ee -->
  <path d="M 37.503 15.799 A 18 18 0 0 1 37.995 19.529 L 30.997 19.712 A 11 11 0 0 0 30.696 17.433 Z" fill="#22d3ee"/>
  <!-- i=4: 1.5°→13.5°, r_in=10, color=#3b82f6 -->
  <path d="M 37.995 20.471 A 18 18 0 0 1 37.503 24.201 L 29.724 22.334 A 10 10 0 0 0 29.997 20.262 Z" fill="#3b82f6"/>
  <!-- i=5: 16.5°→28.5°, r_in=9, color=#6366f1 -->
  <path d="M 37.258 25.112 A 18 18 0 0 1 35.818 28.590 L 27.909 24.295 A 9 9 0 0 0 28.629 22.556 Z" fill="#6366f1"/>
  <!-- i=6: 31.5°→43.5°, r_in=8, color=#7c3aed -->
